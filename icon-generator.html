<!DOCTYPE html>
<html>
<head>
    <title>HASENE Icon Generator</title>
</head>
<body>
    <canvas id="canvas" width="512" height="512"></canvas>
    <br>
    <button onclick="download512()">Download 512x512</button>
    <button onclick="download192()">Download 192x192</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function drawIcon(size) {
            canvas.width = size;
            canvas.height = size;
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#58cc02');
            gradient.addColorStop(1, '#4caf02');
            
            // Draw circle
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(size/2, size/2, size*0.4, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw Arabic letter ع
            ctx.fillStyle = 'white';
            ctx.font = `${size*0.4}px Arial Black`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('ع', size/2, size/2 + size*0.05);
        }
        
        function download512() {
            drawIcon(512);
            const link = document.createElement('a');
            link.download = 'icon-512.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        
        function download192() {
            drawIcon(192);
            const link = document.createElement('a');
            link.download = 'icon-192.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // Initial draw
        drawIcon(512);
    </script>
</body>
</html>
